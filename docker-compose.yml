# ==========================================
# EventFlow Docker Compose — Full Stack
# ==========================================
#
# WHAT IS DOCKER COMPOSE?
# Docker Compose lets you define and run MULTIPLE Docker containers
# with a single command: docker-compose up
#
# This file defines our ENTIRE infrastructure:
#   - 3 Kafka brokers (message queue cluster)
#   - 1 ZooKeeper (Kafka's coordinator)
#   - 3 Cassandra nodes (database cluster)
#   - 1 Prometheus (metrics collection)
#   - 1 Grafana (dashboards)
#   - 1 EventFlow app (our application)
#
# That's 10 containers working together. In production, each of these
# would run on separate servers. Docker Compose simulates that on your laptop.
#
# KEY CONCEPTS:
#   services: each named block defines one container
#   image: the Docker image to use (downloaded from Docker Hub)
#   ports: "host:container" — map container ports to your laptop
#   environment: environment variables passed into the container
#   volumes: mount files from your laptop into the container
#   depends_on: start this container AFTER those containers
#   networks: containers on the same network can talk to each other
#   healthcheck: how Docker knows if the container is healthy

version: '3.8'

services:

  # ==================== ZOOKEEPER ====================
  # ZooKeeper coordinates the Kafka brokers.
  # It tracks which broker is the leader for each partition,
  # manages broker registration, and handles failover.
  # Think of it as the "election manager" for the Kafka cluster.
  #
  # NOTE: Kafka 3.x can run without ZooKeeper ("KRaft mode"),
  # but the ZooKeeper setup is more battle-tested and commonly
  # seen in production/interviews.
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    hostname: zookeeper
    container_name: eventflow-zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: curl -f http://localhost:8080/commands/srvr || exit 1
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eventflow-network

  # ==================== KAFKA BROKER 1 ====================
  # This is one of three Kafka brokers.
  # Having 3 brokers means:
  #   - Data is replicated across 3 machines
  #   - If 1 broker crashes, the other 2 continue serving
  #   - If 2 crash, the remaining 1 still has all data
  #
  # PORTS:
  #   9092: for clients OUTSIDE Docker (your laptop, load-test.sh)
  #   29092: for clients INSIDE Docker (our app container)
  #
  # WHY TWO PORTS?
  # Kafka needs to tell clients where to connect for each partition.
  # If our app (inside Docker) asks "where is partition 0?", Kafka
  # says "connect to kafka-1:29092" (the internal hostname).
  # If load-test.sh (outside Docker) asks, Kafka says "localhost:9092".
  # Without this dual-listener setup, one or the other would fail.
  kafka-1:
    image: confluentinc/cp-kafka:7.5.3
    hostname: kafka-1
    container_name: eventflow-kafka-1
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_NUM_PARTITIONS: 6
    healthcheck:
      test: kafka-broker-api-versions --bootstrap-server localhost:9092
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - eventflow-network

  kafka-2:
    image: confluentinc/cp-kafka:7.5.3
    hostname: kafka-2
    container_name: eventflow-kafka-2
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:29092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    networks:
      - eventflow-network

  kafka-3:
    image: confluentinc/cp-kafka:7.5.3
    hostname: kafka-3
    container_name: eventflow-kafka-3
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 3
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:29092,PLAINTEXT_HOST://localhost:9094
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
    networks:
      - eventflow-network

  # ==================== CASSANDRA NODE 1 ====================
  # Three Cassandra nodes form a peer-to-peer ring.
  # There is NO master node — any node can handle any request.
  #
  # REPLICATION:
  # With replication_factor=3 and 3 nodes, every piece of data
  # exists on ALL 3 nodes. This means:
  #   - ANY node can serve ANY read (fast reads)
  #   - You can lose 1 node and still read/write with QUORUM
  #   - Total data loss only if ALL 3 nodes die simultaneously
  cassandra-1:
    image: cassandra:4.1
    hostname: cassandra-1
    container_name: eventflow-cassandra-1
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_CLUSTER_NAME: eventflow-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    healthcheck:
      test: cqlsh -e "SELECT now() FROM system.local"
      interval: 15s
      timeout: 10s
      retries: 10
    volumes:
      - cassandra-1-data:/var/lib/cassandra
    networks:
      - eventflow-network

  cassandra-2:
    image: cassandra:4.1
    hostname: cassandra-2
    container_name: eventflow-cassandra-2
    depends_on:
      cassandra-1:
        condition: service_healthy
    environment:
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_CLUSTER_NAME: eventflow-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack2
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    networks:
      - eventflow-network

  cassandra-3:
    image: cassandra:4.1
    hostname: cassandra-3
    container_name: eventflow-cassandra-3
    depends_on:
      cassandra-1:
        condition: service_healthy
    environment:
      CASSANDRA_SEEDS: cassandra-1
      CASSANDRA_CLUSTER_NAME: eventflow-cluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack3
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 128M
    networks:
      - eventflow-network

  # ==================== PROMETHEUS ====================
  # Prometheus PULLS metrics from our app every 15 seconds.
  # It stores them as time-series data and supports PromQL queries.
  #
  # PULL vs PUSH:
  # Some monitoring systems (like StatsD) require apps to PUSH metrics.
  # Prometheus PULLS — it hits our /actuator/prometheus endpoint.
  # Pull is better because:
  #   - Prometheus controls the rate (no overwhelming the monitoring system)
  #   - If the app is down, Prometheus sees "scrape failed" (useful signal)
  #   - Apps don't need to know where Prometheus lives
  prometheus:
    image: prom/prometheus:v2.48.1
    container_name: eventflow-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - eventflow-app
    networks:
      - eventflow-network

  # ==================== GRAFANA ====================
  # Grafana connects to Prometheus and displays dashboards.
  # We pre-configure it with:
  #   - Prometheus as a data source (auto-configured)
  #   - Our custom EventFlow dashboard (pre-loaded)
  #
  # Login: admin / admin (change on first login)
  grafana:
    image: grafana/grafana:10.2.3
    container_name: eventflow-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - eventflow-network

  # ==================== EVENTFLOW APP ====================
  # Our application container. Built from the Dockerfile.
  #
  # It connects to Kafka and Cassandra using INTERNAL Docker hostnames
  # (kafka-1:29092, cassandra-1:9042) — not localhost.
  #
  # DEPENDS_ON with conditions: waits for Kafka and Cassandra to be
  # healthy before starting. Without this, our app would crash on
  # startup because Cassandra takes ~30 seconds to initialize.
  eventflow-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eventflow-app
    ports:
      - "8080:8080"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka-1:29092,kafka-2:29092,kafka-3:29092
      CASSANDRA_CONTACT_POINTS: cassandra-1
      CASSANDRA_PORT: 9042
      CASSANDRA_DATACENTER: datacenter1
      CASSANDRA_KEYSPACE: eventflow
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      kafka-1:
        condition: service_healthy
      kafka-2:
        condition: service_started
      kafka-3:
        condition: service_started
      cassandra-1:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:8080/health || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - eventflow-network

# ==================== VOLUMES ====================
# Named volumes persist data between container restarts.
# Without them, every docker-compose down would delete all Cassandra data.
volumes:
  cassandra-1-data:

# ==================== NETWORKS ====================
# All containers on the same network can communicate by hostname.
# eventflow-app can reach "cassandra-1:9042" because they share this network.
networks:
  eventflow-network:
    driver: bridge
