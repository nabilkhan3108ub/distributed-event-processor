# Grafana Datasource Provisioning
# Automatically configures Prometheus as a data source when Grafana starts.
# Without this, you'd have to manually add the datasource in the Grafana UI.

apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
